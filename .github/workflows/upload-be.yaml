name: Upload Backend

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force upload all files'
        required: false
        default: false
        type: boolean

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend/
          server-dir: /be/
          dangerous-clean-slate: ${{ inputs.force }}